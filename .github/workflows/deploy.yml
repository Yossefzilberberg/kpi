name: Deploy Theme to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"

          RESPONSE=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL")

          echo "Webhook response code: $RESPONSE"
          cat /tmp/webhook_response.txt

          if [ "$RESPONSE" != "200" ]; then
            echo "ERROR: Webhook returned $RESPONSE"
            exit 1
          fi

          echo "Deploy triggered successfully."
