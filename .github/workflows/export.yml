name: Export Elementor Data

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger export webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WEBHOOK_EXPORT_URL: ${{ secrets.WEBHOOK_EXPORT_URL }}
        run: |
          PAYLOAD='{"action":"export"}'
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"

          RESPONSE=$(curl -s -o /tmp/export_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            "$WEBHOOK_EXPORT_URL")

          echo "Export webhook response code: $RESPONSE"
          cat /tmp/export_response.txt

          if [ "$RESPONSE" != "200" ]; then
            echo "ERROR: Export webhook returned $RESPONSE"
            exit 1
          fi

          echo "Export triggered. Files will be committed to repo by the server."

      - name: Wait for server push
        run: sleep 15

      - name: Pull exported data
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify export
        run: |
          echo "Files in elementor-data/:"
          ls -la elementor-data/ || echo "No files yet."
